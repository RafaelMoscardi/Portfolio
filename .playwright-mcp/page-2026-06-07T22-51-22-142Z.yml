        - heading "05.Desafios técnicos" [level=2] [ref=e144]
        - generic [ref=e145]:
          - generic [ref=e146]:
            - heading "Isolamento de dados por usuário" [level=3] [ref=e147]
            - paragraph [ref=e148]: Garantir que cada usuário visualize apenas seus próprios serviços e dados, sem vazamento entre contas.
            - generic [ref=e149]:
              - generic [ref=e150]: solução
              - paragraph [ref=e151]: Toda query ao banco inclui o userId da sessão como filtro obrigatório, validado na camada de API.
          - generic [ref=e152]:
            - heading "Prevenção de incidentes duplicados" [level=3] [ref=e153]
            - paragraph [ref=e154]: Evitar que múltiplas falhas consecutivas do mesmo serviço gerem incidentes duplicados.
            - generic [ref=e155]:
              - generic [ref=e156]: solução
              - paragraph [ref=e157]: Verificação de incidente com status 'open' antes de criar um novo, transitando para 'resolved' na recuperação.
          - generic [ref=e158]:
            - heading "Medição precisa de tempo de resposta" [level=3] [ref=e159]
            - paragraph [ref=e160]: Capturar o tempo de resposta real de forma precisa e consistente entre verificações.
            - generic [ref=e161]:
              - generic [ref=e162]: solução
              - paragraph [ref=e163]: Uso de performance.now() antes e após o fetch, armazenando a diferença em milissegundos.
          - generic [ref=e164]:
            - heading "Tratamento de falhas diversas" [level=3] [ref=e165]
            - paragraph [ref=e166]: Lidar com timeouts, DNS inválido, status HTTP de erro e outros tipos de falha.
            - generic [ref=e167]:
              - generic [ref=e168]: solução
              - paragraph [ref=e169]: "Try/catch com categorização de erros: timeout, DNS, HTTP error — cada tipo registrado no histórico."
          - generic [ref=e170]:
            - heading "Arquitetura escalável" [level=3] [ref=e171]
            - paragraph [ref=e172]: Organizar o projeto para adicionar features sem acumular dívida técnica.
            - generic [ref=e173]:
              - generic [ref=e174]: solução
              - paragraph [ref=e175]: Separação clara entre API routes, services, repositories e componentes de UI.
